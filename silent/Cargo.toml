[package]
name = "silent"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["rlib", "staticlib"]
doctest = false

[dependencies]
# NOTE: Path dependency required because bwk-sp depends on workspace crates with external path dependencies
# (spdk/*) that are not available in the git repository. Git dependency would fail to resolve.
# Build environment requires: bwk repo at ../../bwk/ and spdk repo at ../../spdk/
bwk-sp = { path = "../../bwk/sp" }
spdk-core = { path = "../../spdk/spdk-core", default-features = false, features = ["sync", "bitcoin_32"] }
bitcoin = "0.32"
cxx = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.11"
dirs = "6.0"
thiserror = "2.0"
getrandom = "0.2"

[build-dependencies]
cxx-build = "1.0"
